<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido por Voz</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f13; --card: #1a1a22; --accent: #ff6b35;
            --accent2: #ffd166; --text: #f0ede8; --muted: #888;
            --border: #2a2a35; --success: #06d6a0; --red: #ef233c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; width: 100%; max-width: 390px;
            padding: 32px 24px; position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: -60px; right: -60px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(255,107,53,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        h1 {
            font-family: 'Syne', sans-serif; font-size: 1.7rem;
            font-weight: 800; letter-spacing: -0.03em; margin-bottom: 4px;
        }
        h1 span { color: var(--accent); }
        .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }

        /* INSTRUÇÃO */
        .instruction {
            display: flex; align-items: flex-start; gap: 12px;
            background: rgba(255,209,102,0.07); border: 1px solid rgba(255,209,102,0.2);
            border-radius: 12px; padding: 14px; margin-bottom: 22px;
        }
        .instruction .icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
        .instruction p { font-size: 0.83rem; color: var(--accent2); line-height: 1.5; }
        .instruction strong { display: block; margin-bottom: 2px; font-size: 0.88rem; }

        /* CAMPO DE TEXTO */
        .input-wrap { position: relative; margin-bottom: 16px; }
        .pedido-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            padding: 16px 52px 16px 16px;
            resize: none;
            outline: none;
            line-height: 1.5;
            min-height: 80px;
            transition: border-color 0.2s;
        }
        .pedido-input::placeholder { color: var(--muted); }
        .pedido-input:focus { border-color: var(--accent); }

        .clear-btn {
            position: absolute; top: 10px; right: 10px;
            background: var(--border); border: none; border-radius: 8px;
            color: var(--muted); font-size: 0.8rem;
            padding: 5px 8px; cursor: pointer;
            display: none;
        }
        .clear-btn.visible { display: block; }

        /* BOTÃO PROCESSAR */
        .process-btn {
            width: 100%; padding: 16px;
            background: var(--accent); border: none; border-radius: 14px;
            color: white; font-family: 'Syne', sans-serif;
            font-size: 1rem; font-weight: 700;
            letter-spacing: 0.02em; cursor: pointer;
            transition: all 0.2s; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .process-btn:hover { background: #ff5520; transform: translateY(-1px); }
        .process-btn:active { transform: translateY(0); }
        .process-btn:disabled { background: var(--border); color: var(--muted); transform: none; cursor: default; }

        /* RESULTADO */
        .result-box {
            border: 1px solid var(--border); border-radius: 16px;
            overflow: hidden; opacity: 0.4; transition: opacity 0.3s;
        }
        .result-box.ready { opacity: 1; }
        .result-row {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px; border-bottom: 1px solid var(--border);
        }
        .result-row:last-child { border-bottom: none; }
        .result-icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: var(--border); display: flex; align-items: center;
            justify-content: center; font-size: 16px; flex-shrink: 0;
        }
        .result-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        .result-value { font-size: 0.95rem; font-weight: 600; color: var(--text); }
        .result-value.highlight { color: var(--accent2); }

        .status-bar {
            text-align: center; font-size: 0.82rem;
            color: var(--muted); margin-bottom: 14px; min-height: 20px;
            transition: color 0.3s;
        }
        .status-bar.thinking { color: var(--accent); }
        .status-bar.done     { color: var(--success); }
        .status-bar.error    { color: var(--red); }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <h1>Pedido <span>por Voz</span></h1>
    <p class="subtitle">Voz nativa do Android + IA interpreta</p>

    <div class="instruction">
        <div class="icon">🎙️</div>
        <p>
            <strong>Como usar:</strong>
            Toque no campo abaixo → no teclado, toque no <strong>ícone de microfone 🎤</strong> → fale o pedido → confirme → toque em <strong>Processar</strong>.
        </p>
    </div>

    <div class="input-wrap">
        <textarea
            class="pedido-input"
            id="pedidoInput"
            placeholder="Ex: quero duas coca-cola e vou pagar no pix"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
            inputmode="text"
        ></textarea>
        <button class="clear-btn" id="clearBtn" title="Limpar">✕</button>
    </div>

    <div class="status-bar" id="statusBar"></div>

    <button class="process-btn" id="processBtn" disabled>
        ✨ Processar Pedido
    </button>

    <div class="result-box" id="resultBox">
        <div class="result-row">
            <div class="result-icon">🛍️</div>
            <div>
                <div class="result-label">Produto</div>
                <div class="result-value" id="r-produto">–</div>
            </div>
        </div>
        <div class="result-row">
            <div class="result-icon">🔢</div>
            <div>
                <div class="result-label">Quantidade</div>
                <div class="result-value highlight" id="r-qtd">–</div>
            </div>
        </div>
        <div class="result-row">
            <div class="result-icon">💳</div>
            <div>
                <div class="result-label">Pagamento</div>
                <div class="result-value" id="r-pag">–</div>
            </div>
        </div>
    </div>
</div>

<script>
const input      = document.getElementById('pedidoInput');
const clearBtn   = document.getElementById('clearBtn');
const processBtn = document.getElementById('processBtn');
const statusBar  = document.getElementById('statusBar');
const resultBox  = document.getElementById('resultBox');

// Habilita botão quando há texto
input.addEventListener('input', () => {
    const tem = input.value.trim().length > 0;
    processBtn.disabled = !tem;
    clearBtn.classList.toggle('visible', tem);
});

// Limpar campo
clearBtn.onclick = () => {
    input.value = '';
    processBtn.disabled = true;
    clearBtn.classList.remove('visible');
    statusBar.textContent = '';
    statusBar.className = 'status-bar';
    resultBox.classList.remove('ready');
    ['r-produto','r-qtd','r-pag'].forEach(id => {
        document.getElementById(id).textContent = '–';
    });
    input.focus();
};

// Processar
processBtn.onclick = () => {
    const texto = input.value.trim();
    if (!texto) return;
    processarComIA(texto);
};

// Enter no teclado virtual também processa
input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!processBtn.disabled) processBtn.click();
    }
});

async function processarComIA(texto) {
    processBtn.disabled = true;
    processBtn.innerHTML = '<div class="spinner"></div> Processando...';
    setStatus("⚙️ Interpretando o pedido...", "thinking");

    const prompt = `Você é um assistente de lanchonete/comércio.
Analise este pedido e extraia as informações principais.
O texto pode ter erros de digitação ou reconhecimento de voz — interprete a intenção real.

Pedido: "${texto}"

Responda APENAS com JSON válido, sem markdown, sem explicação:
{"produto":"nome do produto (ou Não identificado)","quantidade":número inteiro,"pagamento":"cartão | pix | dinheiro | débito | crédito | Não informado"}`;

    try {
        const resp = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 150,
                messages: [{ role: "user", content: prompt }]
            })
        });

        const data   = await resp.json();
        if (data.error) throw new Error(data.error.message);

        const raw    = (data.content?.[0]?.text || "{}").replace(/```json|```/g,"").trim();
        const parsed = JSON.parse(raw);

        document.getElementById('r-produto').textContent = parsed.produto    || "Não identificado";
        document.getElementById('r-qtd').textContent     = parsed.quantidade ?? 1;
        document.getElementById('r-pag').textContent     = parsed.pagamento  || "Não informado";

        resultBox.classList.add('ready');
        setStatus("✅ Pedido processado com sucesso!", "done");

    } catch(err) {
        console.error(err);
        setStatus("❌ Erro ao processar. Tente novamente.", "error");
    }

    processBtn.disabled = false;
    processBtn.innerHTML = '✨ Processar Pedido';
}

function setStatus(msg, cls) {
    statusBar.textContent = msg;
    statusBar.className   = 'status-bar' + (cls ? ' '+cls : '');
}
</script>
</body>
</html>
