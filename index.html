<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido por Voz Contínuo</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        button { width: 80px; height: 80px; border-radius: 50%; border: none; background: #007bff; color: white; font-size: 30px; cursor: pointer; margin: 20px 0; outline: none; }
        button.recording { background: #dc3545; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .res { text-align: left; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .label { font-weight: bold; font-size: 0.8em; color: #666; }
        #status { font-weight: bold; color: #007bff; }
    </style>
</head>
<body>

<div class="card">
    <h2>Pedido por Voz</h2>
    <p>Clique para iniciar e clique novamente para processar o pedido.</p>
    
    <button id="btn">🎤</button>
    <div id="status">Aguardando...</div>

    <div class="res">
        <p><span class="label">TEXTO COMPLETO:</span> <br><span id="full-text" style="font-size: 0.9em; color: #333;">-</span></p>
        <hr>
        <p><span class="label">PRODUTO:</span> <br><span id="p">-</span></p>
        <p><span class="label">QUANTIDADE:</span> <br><span id="q">-</span></p>
        <p><span class="label">PAGAMENTO:</span> <br><span id="f">-</span></p>
    </div>
</div>

<script>
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const fullTextSpan = document.getElementById('full-text');
    
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!Speech) {
        alert("Navegador não suporta voz.");
    } else {
        const recognition = new Speech();
        recognition.lang = 'pt-BR';
        
        // --- AS DUAS LINHAS CHAVE PARA NÃO CORTAR SOZINHO ---
        recognition.continuous = true; // Não para no silêncio
        recognition.interimResults = true; // Mostra o resultado enquanto você fala
        
        let gravando = false;
        let transcricaoFinal = "";

        btn.onclick = () => {
            if (!gravando) {
                transcricaoFinal = ""; // Limpa para novo pedido
                recognition.start();
            } else {
                recognition.stop();
            }
        };

        recognition.onstart = () => {
            gravando = true;
            btn.classList.add('recording');
            status.innerText = "GRAVANDO... (Clique para parar)";
        };

        recognition.onresult = (e) => {
            let transcricaoTemporaria = "";
            for (let i = e.resultIndex; i < e.results.length; i++) {
                if (e.results[i].isFinal) {
                    transcricaoFinal += e.results[i][0].transcript;
                } else {
                    transcricaoTemporaria += e.results[i][0].transcript;
                }
            }
            // Exibe o que está sendo dito em tempo real
            fullTextSpan.innerText = transcricaoFinal + transcricaoTemporaria;
        };

        recognition.onend = () => {
            gravando = false;
            btn.classList.remove('recording');
            status.innerText = "Processado!";
            processar(fullTextSpan.innerText.toLowerCase());
        };

        recognition.onerror = (e) => {
            console.error(e.error);
            btn.classList.remove('recording');
            status.innerText = "Erro: " + e.error;
            gravando = false;
        };

        function processar(t) {
            const nMap = {"um":1,"dois":2,"três":3,"quatro":4,"cinco":5,"uma":1,"duas":2};
            let qtd = t.match(/\d+/) ? t.match(/\d+/)[0] : "1";
            Object.keys(nMap).forEach(k => { if(t.includes(k)) qtd = nMap[k]; });

            let pag = "Não identificado";
            const formas = ["cartão","pix","dinheiro","débito","crédito"];
            formas.forEach(f => { if(t.includes(f)) pag = f.charAt(0).toUpperCase() + f.slice(1); });

            let prod = t.replace(qtd,"").replace(pag.toLowerCase(),"").replace(/\b(no|em|de|com|por favor|quero|me dá)\b/gi,"").trim();

            document.getElementById('p').innerText = prod || "Não identificado";
            document.getElementById('q').innerText = qtd;
            document.getElementById('f').innerText = pag;
        }
    }
</script>
</body>
</html>
