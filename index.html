<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pedido por Voz Pro</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f9;
            color: #333;
        }
        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 { margin-top: 0; color: #007bff; }
        p { font-size: 0.9em; color: #666; line-height: 1.4; }
        
        #recordBtn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            background-color: #007bff;
            color: white;
            font-size: 32px;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,123,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
        }
        
        #recordBtn.recording {
            background-color: #dc3545;
            transform: scale(1.1);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        #status {
            font-weight: bold;
            margin-bottom: 20px;
            height: 20px;
            font-size: 0.85em;
        }

        .result-box {
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e9ecef;
        }
        .field { 
            margin-bottom: 12px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
        .field:last-child { border-bottom: none; }
        .label { font-size: 0.75em; font-weight: bold; color: #888; text-transform: uppercase; }
        .value { font-size: 1.1em; color: #222; display: block; margin-top: 2px; }
        
        .error-msg { color: #dc3545; font-size: 0.8em; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Novo Pedido</h2>
    <p>Toque no microfone e diga o que deseja.<br>Ex: <i>"Três pizzas no pix"</i></p>
    
    <button id="recordBtn" title="Gravar Pedido">🎤</button>
    <div id="status">Pronto para ouvir</div>

    <div class="result-box">
        <div class="field">
            <span class="label">Produto</span>
            <span id="res-produto" class="value">...</span>
        </div>
        <div class="field">
            <span class="label">Quantidade</span>
            <span id="res-quantidade" class="value">...</span>
        </div>
        <div class="field">
            <span class="label">Pagamento</span>
            <span id="res-pagamento" class="value">...</span>
        </div>
    </div>
    <div id="error-display" class="error-msg"></div>
</div>

<script>
    /**
     * CHECKLIST DE FUNÇÕES:
     * 1. setupRecognition(): Configura a API de voz.
     * 2. toggleRecording(): Inicia/Para a captura de áudio.
     * 3. processarTexto(transcript): Extrai dados via lógica de string/regex.
     * 4. updateUI(dados): Atualiza o HTML com os resultados.
     */

    const recordBtn = document.getElementById('recordBtn');
    const status = document.getElementById('status');
    const errorDisplay = document.getElementById('error-display');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        status.innerText = "Navegador não suportado";
        alert("Atenção: Seu navegador não suporta reconhecimento de voz. Use o Chrome ou Safari.");
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'pt-BR';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recordBtn.addEventListener('click', () => {
            errorDisplay.style.display = 'none';
            try {
                recognition.start();
            } catch (err) {
                console.log("Reconhecimento já estava ativo ou erro de inicialização.");
            }
        });

        recognition.onstart = () => {
            recordBtn.classList.add('recording');
            status.innerText = "Ouvindo agora...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase();
            status.innerText = "Entendido!";
            processarTexto(transcript);
        };

        recognition.onerror = (event) => {
            recordBtn.classList.remove('recording');
            let msg = "Erro: " + event.error;
            
            if (event.error === 'not-allowed') msg = "Permissão de microfone negada.";
            if (event.error === 'network') msg = "Erro de conexão com a rede.";
            if (event.error === 'service-not-allowed') msg = "Use HTTPS para funcionar no celular.";
            
            status.innerText = "Ops! Algo deu errado.";
            errorDisplay.innerText = msg;
            errorDisplay.style.display = 'block';
        };

        recognition.onend = () => {
            recordBtn.classList.remove('recording');
            if(status.innerText === "Ouvindo agora...") status.innerText = "Toque para tentar de novo";
        };
    }

    function processarTexto(texto) {
        // Lógica de extração
        const numerosMap = { "um": 1, "dois": 2, "três": 3, "quatro": 4, "cinco": 5, "uma": 1, "duas": 2 };
        
        // 1. Quantidade (busca número ou palavra)
        let qtd = "1"; 
        const matchNumero = texto.match(/\d+/);
        if (matchNumero) {
            qtd = matchNumero[0];
        } else {
            for (let chave in numerosMap) {
                if (texto.includes(chave)) {
                    qtd = numerosMap[chave];
                    break;
                }
            }
        }

        // 2. Pagamento
        let pagamento = "Não informado";
        const formas = ["cartão", "pix", "dinheiro", "débito", "crédito", "vale"];
        for (let f of formas) {
            if (texto.includes(f)) {
                pagamento = f.charAt(0).toUpperCase() + f.slice(1);
                break;
            }
        }

        // 3. Produto (Limpeza básica)
        let produto = texto;
        // Remove a quantidade do texto do produto
        if (matchNumero) produto = produto.replace(matchNumero[0], "");
        for (let chave in numerosMap) { produto = produto.replace(new RegExp(`\\b${chave}\\b`, 'g'), ""); }
        
        // Remove a forma de pagamento e conectores
        produto = produto.replace(pagamento.toLowerCase(), "")
                         .replace(/\b(no|em|de|com|o|a|os|as|um|uma)\b/gi, "")
                         .replace(/\s+/g, ' ')
                         .trim();

        updateUI(produto, qtd, pagamento);
    }

    function updateUI(p, q, pag) {
        document.getElementById('res-produto').innerText = p || "Produto não identificado";
        document.getElementById('res-quantidade').innerText = q;
        document.getElementById('res-pagamento').innerText = pag;
    }
</script>

</body>
</html>
