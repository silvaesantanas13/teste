<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido por Voz</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f13; --card: #1a1a22; --accent: #ff6b35;
            --accent2: #ffd166; --text: #f0ede8; --muted: #888;
            --border: #2a2a35; --success: #06d6a0; --red: #ef233c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; width: 100%; max-width: 380px;
            padding: 32px 24px; position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: -60px; right: -60px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(255,107,53,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.7rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 4px; }
        h1 span { color: var(--accent); }
        .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }
        .mic-area { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 12px; }
        .mic-btn {
            width: 90px; height: 90px; border-radius: 50%;
            border: 2px solid var(--border); background: var(--bg); color: var(--text);
            font-size: 36px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .mic-btn:hover { border-color: var(--accent); transform: scale(1.05); }
        .mic-btn.recording { background: var(--red); border-color: var(--red); animation: pulse 1.2s infinite; }
        .mic-btn.loading   { background: var(--accent); border-color: var(--accent); }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(239,35,60,0.4); }
            50%     { box-shadow: 0 0 0 14px rgba(239,35,60,0); }
        }
        .status-pill {
            background: var(--border); border-radius: 20px;
            padding: 6px 16px; font-size: 0.8rem; font-weight: 500;
            color: var(--muted); transition: all 0.3s;
        }
        .status-pill.active   { background: rgba(239,35,60,0.15); color: var(--red); }
        .status-pill.done     { background: rgba(6,214,160,0.15);  color: var(--success); }
        .status-pill.thinking { background: rgba(255,107,53,0.15); color: var(--accent); }
        .timer-row {
            display: flex; justify-content: space-between;
            font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; min-height: 16px;
        }
        .silence-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 18px; overflow: hidden; }
        .silence-fill { height: 100%; background: var(--accent2); width: 0%; transition: width 0.1s linear; }
        .transcript-box {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px; margin-bottom: 20px;
            min-height: 56px; max-height: 110px; overflow-y: auto;
            font-size: 0.88rem; color: var(--muted); font-style: italic; line-height: 1.5;
        }
        .transcript-box.has-text { color: var(--text); font-style: normal; }
        .result-box { border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
        .result-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
        .result-row:last-child { border-bottom: none; }
        .result-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .result-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        .result-value { font-size: 0.95rem; font-weight: 600; color: var(--text); }
        .result-value.highlight { color: var(--accent2); }
        .spinner { width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <h1>Pedido <span>por Voz</span></h1>
    <p class="subtitle">Fale o produto, quantidade e pagamento</p>

    <div class="mic-area">
        <button class="mic-btn" id="btn">🎤</button>
        <div class="status-pill" id="status">Toque para falar</div>
    </div>

    <div class="timer-row">
        <span id="totalTimer"></span>
        <span id="silenceLbl"></span>
    </div>
    <div class="silence-bar"><div class="silence-fill" id="silenceFill"></div></div>

    <div class="transcript-box" id="transcript">O que você disser aparecerá aqui...</div>

    <div class="result-box">
        <div class="result-row">
            <div class="result-icon">🛍️</div>
            <div><div class="result-label">Produto</div><div class="result-value" id="r-produto">–</div></div>
        </div>
        <div class="result-row">
            <div class="result-icon">🔢</div>
            <div><div class="result-label">Quantidade</div><div class="result-value highlight" id="r-qtd">–</div></div>
        </div>
        <div class="result-row">
            <div class="result-icon">💳</div>
            <div><div class="result-label">Pagamento</div><div class="result-value" id="r-pag">–</div></div>
        </div>
    </div>
</div>

<script>
/*
  SOLUÇÃO DEFINITIVA PARA DUPLICATAS NO ANDROID
  -----------------------------------------------
  O Android fecha e reabre o reconhecedor automaticamente (onend dispara).
  Ao reabrir, resultIndex volta a 0 — mas os resultados antigos da sessão
  anterior são reportados de novo no próximo onresult.

  Abordagem: usamos um SET de fingerprints (hash da frase normalizada).
  Cada frase final NOVA só entra na lista se ainda não estiver no Set.
  Frases repetidas de sessões reiniciadas são silenciosamente ignoradas.
*/

const btn          = document.getElementById('btn');
const statusEl     = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const silenceFill  = document.getElementById('silenceFill');
const totalTimerEl = document.getElementById('totalTimer');
const silenceLbl   = document.getElementById('silenceLbl');

// Estado
let gravando     = false;
let frasesArr    = [];        // frases finais aceitas, em ordem
let frasesSet    = new Set(); // fingerprints já vistos
let interim      = "";        // texto provisório atual

const SILENCE_MS = 4000;
const MAX_MS     = 60000;

let silenceTimer    = null;
let silenceIv       = null;
let totalIv         = null;
let totalMs         = 0;
let silenceMs       = 0;

// Reconhecedor
const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechAPI) { statusEl.textContent = "Navegador não suportado"; btn.disabled = true; }
let rec;

function novoRec() {
    try { rec && rec.abort(); } catch(e) {}
    rec = new SpeechAPI();
    rec.lang            = 'pt-BR';
    rec.continuous      = true;
    rec.interimResults  = true;
    rec.maxAlternatives = 1;
    rec.onresult = onResult;
    rec.onend    = onEnd;
    rec.onerror  = onError;
}

btn.onclick = () => gravando ? parar(true) : iniciar();

function iniciar() {
    frasesArr = []; frasesSet = new Set(); interim = "";
    gravando = true; totalMs = 0;

    transcriptEl.textContent = "Ouvindo...";
    transcriptEl.classList.remove('has-text');
    setStatus("🔴 Gravando...", "active");
    btn.classList.add('recording');
    btn.textContent = "⏹";

    totalTimerEl.textContent = "⏱ 00:00";
    clearInterval(totalIv);
    totalIv = setInterval(() => {
        totalMs += 1000;
        const m = String(Math.floor(totalMs/60000)).padStart(2,'0');
        const s = String(Math.floor((totalMs%60000)/1000)).padStart(2,'0');
        totalTimerEl.textContent = `⏱ ${m}:${s}`;
        if (totalMs >= MAX_MS) parar(true);
    }, 1000);

    resetSilence();
    novoRec();
    rec.start();
}

function parar(processar) {
    gravando = false;
    clearTimeout(silenceTimer);
    clearInterval(silenceIv);
    clearInterval(totalIv);
    silenceFill.style.width = '0%';
    silenceLbl.textContent  = '';
    try { rec.stop(); } catch(e) {}
    btn.classList.remove('recording');
    btn.textContent = "🎤";

    if (processar) {
        const txt = textoFinal();
        if (txt) processarComIA(txt);
        else { setStatus("Nada capturado", ""); totalTimerEl.textContent = ''; }
    }
}

function onResult(e) {
    interim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
        const frase = e.results[i][0].transcript.trim();
        if (!frase) continue;
        if (e.results[i].isFinal) {
            const fp = norm(frase);
            if (!frasesSet.has(fp)) {
                frasesSet.add(fp);
                frasesArr.push(frase);
            }
        } else {
            interim = frase;
        }
    }
    renderizar();
    resetSilence();
}

function onEnd() {
    if (!gravando) return;
    // Android fechou — descarta interim e reinicia sessão
    interim = "";
    novoRec();
    try { rec.start(); } catch(e) {}
}

function onError(e) {
    if (!gravando) return;
    if (['no-speech','aborted','network'].includes(e.error)) return;
    console.warn("rec error:", e.error);
}

// Normaliza para fingerprint: sem acento, minúsculo, só alfanum+espaço
function norm(txt) {
    return txt.toLowerCase()
              .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
              .replace(/[^a-z0-9 ]/g,"")
              .replace(/\s+/g," ").trim();
}

function textoFinal() {
    return [...frasesArr, interim].filter(Boolean).join(" ").replace(/\s+/g," ").trim();
}

function renderizar() {
    const txt = textoFinal();
    transcriptEl.textContent = txt || "Ouvindo...";
    transcriptEl.classList.toggle('has-text', !!txt);
    transcriptEl.scrollTop = transcriptEl.scrollHeight;
}

function resetSilence() {
    clearTimeout(silenceTimer);
    clearInterval(silenceIv);
    silenceMs = 0;
    silenceFill.style.width = '0%';
    silenceLbl.textContent  = '';

    silenceIv = setInterval(() => {
        silenceMs += 100;
        silenceFill.style.width = Math.min((silenceMs/SILENCE_MS)*100, 100) + '%';
        const rest = Math.ceil((SILENCE_MS - silenceMs)/1000);
        if (rest <= 3 && silenceMs > 800) silenceLbl.textContent = `encerrando em ${rest}s`;
    }, 100);

    silenceTimer = setTimeout(() => { if (gravando) parar(true); }, SILENCE_MS);
}

function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className   = 'status-pill' + (cls ? ' '+cls : '');
}

async function processarComIA(texto) {
    setStatus("⚙️ Interpretando...", "thinking");
    btn.classList.add('loading');
    btn.innerHTML = '<div class="spinner"></div>';
    transcriptEl.textContent = texto;
    transcriptEl.classList.add('has-text');
    totalTimerEl.textContent = '';

    const prompt = `Você é um assistente de lanchonete. Analise este pedido falado.
O texto pode ter pequenas repetições de voz — interprete a intenção real.

Texto: "${texto}"

Responda APENAS JSON válido, sem markdown:
{"produto":"nome (ou Não identificado)","quantidade":número,"pagamento":"cartão|pix|dinheiro|débito|crédito|Não informado"}`;

    try {
        const resp = await fetch("https://api.anthropic.com/v1/messages", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                model:"claude-sonnet-4-20250514", max_tokens:200,
                messages:[{role:"user",content:prompt}]
            })
        });
        const data   = await resp.json();
        const raw    = (data.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim();
        const parsed = JSON.parse(raw);
        document.getElementById('r-produto').textContent = parsed.produto    || "Não identificado";
        document.getElementById('r-qtd').textContent     = parsed.quantidade ?? 1;
        document.getElementById('r-pag').textContent     = parsed.pagamento  || "Não informado";
        setStatus("✅ Pedido processado!", "done");
    } catch(err) {
        console.error(err);
        fallback(texto);
        setStatus("⚠️ Processado localmente", "done");
    }

    btn.classList.remove('loading');
    btn.textContent = "🎤";
}

function fallback(t) {
    const txt = t.toLowerCase();
    const nMap = {"um":1,"uma":1,"dois":2,"duas":2,"três":3,"quatro":4,"cinco":5};
    let qtd = 1;
    const nm = txt.match(/\d+/); if (nm) qtd = parseInt(nm[0]);
    Object.keys(nMap).forEach(k => { if (txt.split(" ").includes(k)) qtd = nMap[k]; });
    let pag = "Não informado";
    ["cartão","pix","dinheiro","débito","crédito"].forEach(f => {
        if (txt.includes(f)) pag = f[0].toUpperCase()+f.slice(1);
    });
    let prod = txt
        .replace(/\d+/g,"")
        .replace(/\b(quero|uma|um|no|em|de|com|por favor|me dá|me|pra|para|favor)\b/gi,"")
        .replace(pag.toLowerCase(),"")
        .replace(/\s+/g,' ').trim();
    document.getElementById('r-produto').textContent = prod || "Não identificado";
    document.getElementById('r-qtd').textContent     = qtd;
    document.getElementById('r-pag').textContent     = pag;
}
</script>
</body>
</html>
