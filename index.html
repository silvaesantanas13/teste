<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido por Voz Robusto</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        button { width: 80px; height: 80px; border-radius: 50%; border: none; background: #007bff; color: white; font-size: 30px; cursor: pointer; margin: 20px 0; }
        button.recording { background: #dc3545; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .res { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 10px; }
        .label { font-weight: bold; font-size: 0.8em; color: #666; }
        hr { border: 0; border-top: 1px solid #ddd; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>Fazer Pedido</h2>
    <p id="instruction">Toque no microfone para falar</p>
    
    <button id="btn">🎤</button>
    <div id="status">Pronto</div>

    <div class="res">
        <span class="label">O QUE EU OUVI:</span>
        <p id="full-text" style="color: #333; font-style: italic;">...</p>
        <hr>
        <p><span class="label">PRODUTO:</span> <br><span id="p">-</span></p>
        <p><span class="label">QUANTIDADE:</span> <br><span id="q">-</span></p>
        <p><span class="label">PAGAMENTO:</span> <br><span id="f">-</span></p>
    </div>
</div>

<script>
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const fullTextSpan = document.getElementById('full-text');
    
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new Speech();

    recognition.lang = 'pt-BR';
    recognition.continuous = true;
    recognition.interimResults = true;

    let deveEstarGravando = false;
    let transcricaoFinal = "";

    btn.onclick = () => {
        if (!deveEstarGravando) {
            iniciarGravacao();
        } else {
            pararGravacao();
        }
    };

    function iniciarGravacao() {
        deveEstarGravando = true;
        transcricaoFinal = "";
        fullTextSpan.innerText = "";
        recognition.start();
        btn.classList.add('recording');
        status.innerText = "GRAVANDO... Toque para parar";
    }

    function pararGravacao() {
        deveEstarGravando = false;
        recognition.stop();
        btn.classList.remove('recording');
        status.innerText = "Processando pedido...";
    }

    recognition.onresult = (e) => {
        let interimTranscript = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
            const transcript = e.results[i][0].transcript;
            if (e.results[i].isFinal) {
                transcricaoFinal += transcript + " ";
            } else {
                interimTranscript += transcript;
            }
        }
        fullTextSpan.innerText = (transcricaoFinal + interimTranscript).trim();
    };

    // CORREÇÃO PARA ANDROID: Se o sistema cortar o áudio mas o botão ainda estiver "on", religa!
    recognition.onend = () => {
        if (deveEstarGravando) {
            console.log("Reiniciando captura automaticamente...");
            recognition.start();
        } else {
            processarPedido(fullTextSpan.innerText.toLowerCase());
        }
    };

    recognition.onerror = (e) => {
        if (e.error === 'no-speech' && deveEstarGravando) return; // Ignora erro de silêncio se estivermos em modo manual
        console.error("Erro:", e.error);
    };

    function processarPedido(t) {
        const nMap = {"um":1,"dois":2,"três":3,"quatro":4,"cinco":5,"uma":1,"duas":2};
        let qtd = t.match(/\d+/) ? t.match(/\d+/)[0] : "1";
        Object.keys(nMap).forEach(k => { 
            if(t.split(" ").includes(k)) qtd = nMap[k]; 
        });

        let pag = "Não identificado";
        const formas = ["cartão","pix","dinheiro","débito","crédito"];
        formas.forEach(f => { if(t.includes(f)) pag = f.charAt(0).toUpperCase() + f.slice(1); });

        // Limpa palavras repetidas (como no seu print) e termos de apoio
        let prod = t.replace(new RegExp(qtd, 'g'), "")
                    .replace(pag.toLowerCase(), "")
                    .replace(/\b(quero|uma|um|no|em|de|com|por favor|me dá|coca|lata)\b/gi, (match) => {
                        // Mantemos "coca" e "lata", só limpamos verbos e artigos repetidos
                        return ["quero", "uma", "um", "no", "em", "de", "com", "por favor", "me dá"].includes(match.toLowerCase()) ? "" : match;
                    })
                    .replace(/\s+/g, ' ')
                    .trim();

        document.getElementById('p').innerText = prod || "Não identificado";
        document.getElementById('q').innerText = qtd;
        document.getElementById('f').innerText = pag;
        status.innerText = "Concluído!";
    }
</script>
</body>
</html>
