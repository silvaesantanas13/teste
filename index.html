<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido por Voz</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f13;
            --card: #1a1a22;
            --accent: #ff6b35;
            --accent2: #ffd166;
            --text: #f0ede8;
            --muted: #888;
            --border: #2a2a35;
            --success: #06d6a0;
            --red: #ef233c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 100%;
            max-width: 380px;
            padding: 32px 24px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(255,107,53,0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 4px;
        }

        h1 span { color: var(--accent); }

        .subtitle {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        /* MIC BUTTON */
        .mic-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .mic-btn {
            width: 90px; height: 90px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 36px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .mic-btn:hover { border-color: var(--accent); transform: scale(1.05); }

        .mic-btn.recording {
            background: var(--red);
            border-color: var(--red);
            animation: pulse 1.2s infinite;
        }

        .mic-btn.loading {
            background: var(--accent);
            border-color: var(--accent);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,35,60,0.4); }
            50% { box-shadow: 0 0 0 14px rgba(239,35,60,0); }
        }

        .status-pill {
            background: var(--border);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--muted);
            transition: all 0.3s;
        }

        .status-pill.active { background: rgba(239,35,60,0.15); color: var(--red); }
        .status-pill.done { background: rgba(6,214,160,0.15); color: var(--success); }
        .status-pill.thinking { background: rgba(255,107,53,0.15); color: var(--accent); }

        /* TRANSCRIPT */
        .transcript-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 20px;
            min-height: 56px;
            font-size: 0.88rem;
            color: var(--muted);
            font-style: italic;
            line-height: 1.5;
        }

        .transcript-box.has-text { color: var(--text); font-style: normal; }

        /* RESULT */
        .result-box {
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        .result-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .result-row:last-child { border-bottom: none; }

        .result-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .result-label {
            font-size: 0.72rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }

        .result-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .result-value.highlight { color: var(--accent2); }

        /* SPINNER */
        .spinner {
            width: 22px; height: 22px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TIMER BAR */
        .timer-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
            display: none;
        }
        .timer-bar.active { display: block; }
        .timer-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Pedido <span>por Voz</span></h1>
    <p class="subtitle">Fale o produto, quantidade e pagamento</p>

    <div class="mic-area">
        <button class="mic-btn" id="btn" title="Gravar pedido">🎤</button>
        <div class="status-pill" id="status">Toque para falar</div>
    </div>

    <div class="timer-bar" id="timerBar">
        <div class="timer-fill" id="timerFill"></div>
    </div>

    <div class="transcript-box" id="transcript">O que você disser aparecerá aqui...</div>

    <div class="result-box" id="result">
        <div class="result-row">
            <div class="result-icon">🛍️</div>
            <div>
                <div class="result-label">Produto</div>
                <div class="result-value" id="r-produto">–</div>
            </div>
        </div>
        <div class="result-row">
            <div class="result-icon">🔢</div>
            <div>
                <div class="result-label">Quantidade</div>
                <div class="result-value highlight" id="r-qtd">–</div>
            </div>
        </div>
        <div class="result-row">
            <div class="result-icon">💳</div>
            <div>
                <div class="result-label">Pagamento</div>
                <div class="result-value" id="r-pag">–</div>
            </div>
        </div>
    </div>
</div>

<script>
const btn = document.getElementById('btn');
const statusEl = document.getElementById('status');
const transcriptEl = document.getElementById('transcript');
const timerBar = document.getElementById('timerBar');
const timerFill = document.getElementById('timerFill');

// --- Estado ---
let gravando = false;
let textoFinal = "";
let textoInterim = "";
let silenceTimer = null;
let timerInterval = null;
let SILENCE_TIMEOUT = 2500; // ms de silêncio para parar
let timerElapsed = 0;

// --- Speech Recognition ---
const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!Speech) {
    statusEl.textContent = "Navegador não suportado";
    btn.disabled = true;
}
const rec = new Speech();
rec.lang = 'pt-BR';
rec.continuous = true;
rec.interimResults = true;

btn.onclick = () => {
    if (!gravando) iniciar();
    else parar();
};

function iniciar() {
    gravando = true;
    textoFinal = "";
    textoInterim = "";
    transcriptEl.textContent = "Ouvindo...";
    transcriptEl.classList.remove('has-text');
    setStatus("🔴 Gravando...", "active");
    btn.classList.add('recording');
    btn.textContent = "⏹";
    iniciarTimerSilencio();
    rec.start();
}

function parar() {
    gravando = false;
    clearTimeout(silenceTimer);
    clearInterval(timerInterval);
    timerBar.classList.remove('active');
    rec.stop();
    btn.classList.remove('recording');
    btn.textContent = "🎤";
}

function reiniciarTimerSilencio() {
    clearTimeout(silenceTimer);
    clearInterval(timerInterval);
    timerElapsed = 0;
    timerFill.style.width = '0%';
    timerBar.classList.add('active');

    timerInterval = setInterval(() => {
        timerElapsed += 100;
        timerFill.style.width = Math.min((timerElapsed / SILENCE_TIMEOUT) * 100, 100) + '%';
    }, 100);

    silenceTimer = setTimeout(() => {
        if (gravando) parar();
    }, SILENCE_TIMEOUT);
}

function iniciarTimerSilencio() {
    timerBar.classList.add('active');
    reiniciarTimerSilencio();
}

rec.onresult = (e) => {
    textoInterim = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
            textoFinal += t + " ";
        } else {
            textoInterim = t;
        }
    }

    // Deduplica texto final acumulado
    const textoLimpo = deduplicar(textoFinal + textoInterim);
    transcriptEl.textContent = textoLimpo.trim() || "Ouvindo...";
    transcriptEl.classList.toggle('has-text', !!textoLimpo.trim());

    // Reinicia timer de silêncio a cada nova fala
    reiniciarTimerSilencio();
};

rec.onend = () => {
    if (gravando) {
        // Android corta: reinicia automaticamente
        try { rec.start(); } catch(e) {}
    } else {
        const texto = deduplicar(textoFinal || textoInterim);
        if (texto.trim()) {
            processarComIA(texto.trim());
        }
    }
};

rec.onerror = (e) => {
    if (e.error === 'no-speech' && gravando) return;
    if (e.error === 'aborted') return;
    console.warn("Erro rec:", e.error);
};

// --- Deduplicação: remove palavras repetidas consecutivas (ex: "queroquero") ---
function deduplicar(texto) {
    if (!texto) return "";
    // Remove repetições de palavras inteiras
    let resultado = texto.replace(/\b(\w+)(\s+\1)+\b/gi, '$1');
    // Remove repetições de frases curtas (2–3 palavras)
    resultado = resultado.replace(/(\b\w+\s+\w+\b)(\s+\1)+/gi, '$1');
    return resultado;
}

// --- Processa com IA ---
async function processarComIA(texto) {
    setStatus("⚙️ Interpretando...", "thinking");
    btn.classList.add('loading');
    btn.innerHTML = '<div class="spinner"></div>';
    transcriptEl.textContent = texto;
    transcriptEl.classList.add('has-text');

    const prompt = `Você é um assistente de lanchonete/comércio. Analise este pedido falado e extraia as informações.
O texto pode ter repetições e ruídos de voz — ignore-os e interprete a intenção real.

Texto do pedido: "${texto}"

Responda APENAS em JSON válido, sem markdown, sem explicações:
{
  "produto": "nome do produto identificado (ou 'Não identificado')",
  "quantidade": número inteiro (padrão 1 se não mencionado),
  "pagamento": "forma de pagamento (cartão, pix, dinheiro, débito, crédito, ou 'Não informado')"
}`;

    try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 200,
                messages: [{ role: "user", content: prompt }]
            })
        });

        const data = await response.json();
        const raw = data.content?.[0]?.text || "{}";
        const clean = raw.replace(/```json|```/g, "").trim();
        const parsed = JSON.parse(clean);

        document.getElementById('r-produto').textContent = parsed.produto || "Não identificado";
        document.getElementById('r-qtd').textContent = parsed.quantidade ?? 1;
        document.getElementById('r-pag').textContent = parsed.pagamento || "Não informado";
        setStatus("✅ Pedido processado!", "done");
    } catch (err) {
        console.error(err);
        // Fallback sem IA
        fallbackLocal(texto);
        setStatus("⚠️ Processado localmente", "done");
    }

    btn.classList.remove('loading');
    btn.textContent = "🎤";
}

function fallbackLocal(t) {
    const txt = t.toLowerCase();
    const nMap = {"um":1,"dois":2,"três":3,"quatro":4,"cinco":5,"uma":1,"duas":2};
    let qtd = 1;
    const numMatch = txt.match(/\d+/);
    if (numMatch) qtd = parseInt(numMatch[0]);
    Object.keys(nMap).forEach(k => { if (txt.split(" ").includes(k)) qtd = nMap[k]; });

    let pag = "Não informado";
    ["cartão","pix","dinheiro","débito","crédito"].forEach(f => {
        if (txt.includes(f)) pag = f.charAt(0).toUpperCase() + f.slice(1);
    });

    let prod = deduplicar(txt)
        .replace(/\d+/g, "")
        .replace(/\b(quero|uma|um|no|em|de|com|por favor|me dá|me|pra|para)\b/gi, "")
        .replace(pag.toLowerCase(), "")
        .replace(/\s+/g, ' ').trim();

    document.getElementById('r-produto').textContent = prod || "Não identificado";
    document.getElementById('r-qtd').textContent = qtd;
    document.getElementById('r-pag').textContent = pag;
}

function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className = 'status-pill' + (cls ? ' ' + cls : '');
}
</script>
</body>
</html>
