<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido por Voz</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f13; --card: #1a1a22; --accent: #ff6b35;
            --accent2: #ffd166; --text: #f0ede8; --muted: #888;
            --border: #2a2a35; --success: #06d6a0; --red: #ef233c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; width: 100%; max-width: 390px;
            padding: 32px 24px; position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: -60px; right: -60px;
            width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(255,107,53,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.7rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 4px; }
        h1 span { color: var(--accent); }
        .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }

        .instruction {
            display: flex; align-items: flex-start; gap: 12px;
            background: rgba(255,209,102,0.07); border: 1px solid rgba(255,209,102,0.2);
            border-radius: 12px; padding: 14px; margin-bottom: 22px;
        }
        .instruction .icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 1px; }
        .instruction p { font-size: 0.83rem; color: var(--accent2); line-height: 1.6; }
        .instruction strong { display: block; margin-bottom: 3px; font-size: 0.88rem; }

        .input-wrap { position: relative; margin-bottom: 14px; }
        .pedido-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 1.05rem;
            padding: 16px 48px 16px 16px;
            resize: none; outline: none; line-height: 1.5;
            min-height: 80px;
            transition: border-color 0.2s;
        }
        .pedido-input::placeholder { color: var(--muted); font-size: 0.92rem; }
        .pedido-input:focus { border-color: var(--accent); }

        .clear-btn {
            position: absolute; top: 10px; right: 10px;
            background: var(--border); border: none; border-radius: 8px;
            color: var(--muted); font-size: 0.78rem;
            padding: 5px 8px; cursor: pointer; display: none;
        }
        .clear-btn.visible { display: block; }

        .process-btn {
            width: 100%; padding: 16px;
            background: var(--accent); border: none; border-radius: 14px;
            color: white; font-family: 'Syne', sans-serif;
            font-size: 1rem; font-weight: 700; letter-spacing: 0.02em;
            cursor: pointer; transition: all 0.2s; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .process-btn:hover:not(:disabled) { background: #ff5520; transform: translateY(-1px); }
        .process-btn:disabled { background: var(--border); color: var(--muted); cursor: default; }

        .status-bar {
            text-align: center; font-size: 0.82rem; color: var(--muted);
            margin-bottom: 14px; min-height: 20px; transition: color 0.3s;
        }
        .status-bar.done  { color: var(--success); }
        .status-bar.error { color: var(--red); }

        .result-box {
            border: 1px solid var(--border); border-radius: 16px;
            overflow: hidden; transition: opacity 0.3s; opacity: 0.35;
        }
        .result-box.ready { opacity: 1; }

        .result-row {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 16px; border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        .result-row:last-child { border-bottom: none; }
        .result-row.updated { background: rgba(255,107,53,0.07); }

        .result-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .result-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        .result-value { font-size: 0.95rem; font-weight: 600; color: var(--text); }
        .result-value.highlight { color: var(--accent2); }
    </style>
</head>
<body>
<div class="card">
    <h1>Pedido <span>por Voz</span></h1>
    <p class="subtitle">Fale pelo teclado · a IA interpreta na hora</p>

    <div class="instruction">
        <div class="icon">🎙️</div>
        <p>
            <strong>Como usar:</strong>
            Toque no campo → no teclado toque no <strong>microfone 🎤</strong> → fale o pedido → confirme → toque em <strong>Processar</strong>.
        </p>
    </div>

    <div class="input-wrap">
        <textarea
            class="pedido-input"
            id="pedidoInput"
            placeholder="Ex: duas coca-cola gelada no pix&#10;ou: 3 salgados e um suco no cartão"
            autocomplete="off" autocorrect="off" spellcheck="false"
        ></textarea>
        <button class="clear-btn" id="clearBtn">✕</button>
    </div>

    <div class="status-bar" id="statusBar"></div>

    <button class="process-btn" id="processBtn" disabled>✨ Processar Pedido</button>

    <div class="result-box" id="resultBox">
        <div class="result-row" id="row-produto">
            <div class="result-icon">🛍️</div>
            <div><div class="result-label">Produto</div><div class="result-value" id="r-produto">–</div></div>
        </div>
        <div class="result-row" id="row-qtd">
            <div class="result-icon">🔢</div>
            <div><div class="result-label">Quantidade</div><div class="result-value highlight" id="r-qtd">–</div></div>
        </div>
        <div class="result-row" id="row-pag">
            <div class="result-icon">💳</div>
            <div><div class="result-label">Pagamento</div><div class="result-value" id="r-pag">–</div></div>
        </div>
    </div>
</div>

<script>
const input      = document.getElementById('pedidoInput');
const clearBtn   = document.getElementById('clearBtn');
const processBtn = document.getElementById('processBtn');
const statusBar  = document.getElementById('statusBar');
const resultBox  = document.getElementById('resultBox');

input.addEventListener('input', () => {
    const tem = input.value.trim().length > 0;
    processBtn.disabled = !tem;
    clearBtn.classList.toggle('visible', tem);
});

clearBtn.onclick = () => {
    input.value = '';
    processBtn.disabled = true;
    clearBtn.classList.remove('visible');
    statusBar.textContent = '';
    statusBar.className = 'status-bar';
    resultBox.classList.remove('ready');
    ['r-produto','r-qtd','r-pag'].forEach(id => document.getElementById(id).textContent = '–');
    ['row-produto','row-qtd','row-pag'].forEach(id => document.getElementById(id).classList.remove('updated'));
    input.focus();
};

input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!processBtn.disabled) processBtn.click(); }
});

processBtn.onclick = () => {
    const texto = input.value.trim();
    if (!texto) return;
    processar(texto);
};

// ─────────────────────────────────────────────────────────────
// PROCESSAMENTO LOCAL — sem API externa, funciona offline
// ─────────────────────────────────────────────────────────────
function processar(raw) {
    const t = normalizar(raw);

    const qtd     = extrairQuantidade(t);
    const pag     = extrairPagamento(t);
    const produto = extrairProduto(t, qtd, pag);

    setValor('r-produto', capitalizar(produto) || 'Não identificado', 'row-produto');
    setValor('r-qtd',     String(qtd),                                 'row-qtd');
    setValor('r-pag',     capitalizar(pag) || 'Não informado',         'row-pag');

    resultBox.classList.add('ready');
    setStatus('✅ Pedido processado!', 'done');
}

/* ── Normaliza: minúsculo, sem acento, espaços limpos ── */
function normalizar(txt) {
    return txt
        .toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/[^\w\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

/* ── Quantidade ── */
function extrairQuantidade(t) {
    // Números escritos por extenso
    const extenso = {
        'um': 1, 'uma': 1, 'hum': 1,
        'dois': 2, 'duas': 2,
        'tres': 3, 'trez': 3,
        'quatro': 4,
        'cinco': 5,
        'seis': 6,
        'sete': 7,
        'oito': 8,
        'nove': 9,
        'dez': 10,
    };

    // Número dígito: "2 coca", "10 coxinhas"
    const mDigito = t.match(/\b(\d+)\b/);
    if (mDigito) return parseInt(mDigito[1]);

    // Por extenso
    for (const [palavra, valor] of Object.entries(extenso)) {
        const re = new RegExp(`\\b${palavra}\\b`);
        if (re.test(t)) return valor;
    }

    return 1;
}

/* ── Pagamento ── */
function extrairPagamento(t) {
    const formas = [
        { re: /\b(cartao de credito|credito)\b/, label: 'Crédito' },
        { re: /\b(cartao de debito|debito)\b/,   label: 'Débito' },
        { re: /\b(cartao)\b/,                     label: 'Cartão' },
        { re: /\b(pix)\b/,                        label: 'Pix' },
        { re: /\b(dinheiro|especie|vista)\b/,      label: 'Dinheiro' },
        { re: /\b(vale refeicao|vr|vale)\b/,       label: 'Vale refeição' },
    ];
    for (const { re, label } of formas) {
        if (re.test(t)) return label;
    }
    return null;
}

/* ── Produto: remove palavras de quantidade, pagamento e verbos ── */
function extrairProduto(t, qtd, pag) {
    // Remove número dígito
    let s = t.replace(/\b\d+\b/g, '');

    // Remove extenso do número encontrado
    const extensoMap = {
        1: ['um','uma','hum'], 2: ['dois','duas'], 3: ['tres','trez'],
        4: ['quatro'], 5: ['cinco'], 6: ['seis'], 7: ['sete'],
        8: ['oito'], 9: ['nove'], 10: ['dez'],
    };
    if (extensoMap[qtd]) {
        extensoMap[qtd].forEach(p => {
            s = s.replace(new RegExp(`\\b${p}\\b`, 'g'), '');
        });
    }

    // Remove forma de pagamento
    if (pag) {
        const pagNorm = normalizar(pag);
        s = s.replace(new RegExp(`\\b${pagNorm}\\b`, 'g'), '');
        // variantes comuns
        s = s.replace(/\b(cartao|cartao de credito|cartao de debito|credito|debito|pix|dinheiro|especie|vista|vale refeicao|vr|vale)\b/g, '');
    }

    // Remove palavras funcionais e verbos de pedido
    const lixo = [
        'quero','queria','me da','me de','me traz','traz','traga','pode trazer',
        'por favor','pfv','pf','obrigado','obrigada',
        'um','uma','umas','uns',
        'no','na','nos','nas','pelo','pela','com','sem','de','do','da','dos','das',
        'e','ou','mais','ja','ai','la','aqui','ali','isso','esse','essa','aquele',
        'favor','gentileza','preciso','precisa','gostaria','gosta',
        'pagar','pagamento','pago',
        'gelad[ao]','gelada','geladinha','bem','frio','fria',
        'por','para','pra','pro',
    ];
    lixo.forEach(p => {
        s = s.replace(new RegExp(`\\b${p}\\b`, 'g'), '');
    });

    return s.replace(/\s+/g, ' ').trim();
}

function capitalizar(str) {
    if (!str) return str;
    return str.charAt(0).toUpperCase() + str.slice(1);
}

function setValor(id, valor, rowId) {
    const el  = document.getElementById(id);
    const row = document.getElementById(rowId);
    el.textContent = valor;
    row.classList.add('updated');
}

function setStatus(msg, cls) {
    statusBar.textContent = msg;
    statusBar.className   = 'status-bar' + (cls ? ' ' + cls : '');
}
</script>
</body>
</html>
